<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeZerra Shield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 13px;
    }

    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .header-icon { font-size: 22px; }
    .header-title { font-size: 15px; font-weight: 600; color: #f1f5f9; }
    .header-sub   { font-size: 11px; color: #64748b; }

    .score-section {
      padding: 20px 16px;
      display: flex; align-items: center; gap: 16px;
    }
    .score-ring {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border: 3px solid;
      flex-direction: column;
    }
    .score-ring.safe     { border-color: #22c55e; background: #052e16; }
    .score-ring.warned   { border-color: #f59e0b; background: #1c1007; }
    .score-ring.blocked  { border-color: #ef4444; background: #1c0000; }
    .score-ring.loading  { border-color: #475569; background: #1e293b; }
    .score-number { font-size: 20px; font-weight: 700; line-height: 1; }
    .score-label  { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .score-ring.safe    .score-number { color: #22c55e; }
    .score-ring.warned  .score-number { color: #f59e0b; }
    .score-ring.blocked .score-number { color: #ef4444; }

    .verdict-text { flex: 1; }
    .verdict-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .verdict-title.safe    { color: #22c55e; }
    .verdict-title.warned  { color: #f59e0b; }
    .verdict-title.blocked { color: #ef4444; }
    .verdict-desc { font-size: 12px; color: #94a3b8; line-height: 1.5; }

    .url-bar {
      margin: 0 16px 12px;
      background: #1e293b; border-radius: 6px;
      padding: 7px 10px;
      font-size: 11px; color: #64748b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .section { padding: 0 16px 12px; }
    .section-title {
      font-size: 10px; font-weight: 600; color: #475569;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .signal-item {
      display: flex; gap: 7px; align-items: flex-start;
      color: #94a3b8; font-size: 12px; padding: 3px 0; line-height: 1.5;
    }
    .signal-dot { color: #f59e0b; margin-top: 2px; }

    .source-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0; border-bottom: 1px solid #1e293b;
    }
    .source-item:last-child { border-bottom: none; }
    .source-name  { color: #cbd5e1; font-size: 12px; }
    .source-score {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px;
    }
    .source-score.low  { background: #052e16; color: #22c55e; }
    .source-score.med  { background: #1c1007; color: #f59e0b; }
    .source-score.high { background: #1c0000; color: #ef4444; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-link {
      font-size: 11px; color: #475569; cursor: pointer; text-decoration: none;
    }
    .footer-link:hover { color: #94a3b8; }

    .badge-safe    { background: #052e16; color: #22c55e; }
    .badge-warned  { background: #1c1007; color: #f59e0b; }
    .badge-blocked { background: #1c0000; color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🛡️</span>
    <div>
      <div class="header-title">DeZerra Shield</div>
      <div class="header-sub">Phishing & Threat Detector</div>
    </div>
  </div>

  <div id="main-content">
    <div class="score-section">
      <div class="score-ring loading" id="score-ring">
        <div class="score-number" id="score-number">—</div>
        <div class="score-label">score</div>
      </div>
      <div class="verdict-text">
        <div class="verdict-title" id="verdict-title">Checking...</div>
        <div class="verdict-desc" id="verdict-desc">Analyzing the current page for threats.</div>
      </div>
    </div>

    <div class="url-bar" id="url-bar">Loading...</div>

    <div class="section" id="signals-section" style="display:none">
      <div class="section-title">Detection signals</div>
      <div id="signals-list"></div>
    </div>

    <div class="section" id="sources-section" style="display:none">
      <div class="section-title">Intelligence sources</div>
      <div id="sources-list"></div>
    </div>
  </div>

  <div class="footer">
    <a class="footer-link" id="log-link" href="#">View threat log</a>
    <span class="footer-link" style="color:#1e3a5f;">DeZerra Shield v1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
